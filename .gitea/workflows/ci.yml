name: MCTP-API CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          sed -i 's/deb.debian.org/mirrors.aliyun.com/g' /etc/apt/sources.list.d/debian.sources 2>/dev/null || \
          sed -i 's/deb.debian.org/mirrors.aliyun.com/g' /etc/apt/sources.list 2>/dev/null || true
          apt-get update -qq && apt-get install -y -qq git --no-install-recommends
          git clone http://110.42.14.118:21002/MCTP_admin/MCTP-API.git --branch ${{ gitea.ref_name }} --depth 1 /src
      - name: Install ruff
        run: pip install -i https://mirrors.aliyun.com/pypi/simple/ ruff
      - name: Ruff check
        run: ruff check /src
      - name: Ruff format check
        run: ruff format --check /src

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        run: |
          sed -i 's/deb.debian.org/mirrors.aliyun.com/g' /etc/apt/sources.list.d/debian.sources 2>/dev/null || \
          sed -i 's/deb.debian.org/mirrors.aliyun.com/g' /etc/apt/sources.list 2>/dev/null || true
          apt-get update -qq && apt-get install -y -qq git --no-install-recommends
          git clone http://110.42.14.118:21002/MCTP_admin/MCTP-API.git --branch ${{ gitea.ref_name }} --depth 1 /src
      - name: Install dependencies
        run: pip install -i https://mirrors.aliyun.com/pypi/simple/ -r /src/requirements.txt
      - name: Django check
        run: python /src/manage.py check
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "False"
      - name: Run tests
        run: python /src/manage.py test --verbosity=2
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "False"
