name: MCTP-API CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          apt-get update -qq && apt-get install -y -qq git
          git clone http://172.18.0.4:3000/MCTP_admin/MCTP-API.git --branch ${{ gitea.ref_name }} --depth 1 /workspace
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check /workspace
      - name: Ruff format check
        run: ruff format --check /workspace

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        run: |
          apt-get update -qq && apt-get install -y -qq git
          git clone http://172.18.0.4:3000/MCTP_admin/MCTP-API.git --branch ${{ gitea.ref_name }} --depth 1 /workspace
      - name: Install dependencies
        run: pip install -r /workspace/requirements.txt
      - name: Django check
        run: python /workspace/manage.py check
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "False"
      - name: Run tests
        run: python /workspace/manage.py test --verbosity=2
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "False"
