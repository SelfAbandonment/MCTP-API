name: Auto Label PR

on:
  pull_request:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Auto label by branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];

            if (branch.startsWith('feat/')) labels.push('enhancement');
            else if (branch.startsWith('fix/')) labels.push('bug');
            else if (branch.startsWith('docs/')) labels.push('documentation');
            else if (branch.startsWith('hotfix/')) labels.push('bug', 'urgent');
            else if (branch.startsWith('refactor/')) labels.push('refactor');
            else if (branch.startsWith('test/')) labels.push('test');
            else if (branch.startsWith('chore/')) labels.push('chore');
            else if (branch.startsWith('release/')) labels.push('release');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }
